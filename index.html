<title>SM International Quality Control</title>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

/* NAVBAR */
nav {
    position: fixed;
    width: 100%;
    height: 70px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 50px;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
}

nav h2 {
    color: #00c6ff;
}

nav a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
    font-weight: bold;
}

/* HERO (الصورة بس) */
.hero {
    height: 100vh;
    background: url("sm.jpg") no-repeat center top;
    background-size: cover;
    background-color: #0f2027;
}

/* SERVICES */
.services {
    padding: 80px 20px;
    background: #0f2027;
    text-align: center;
    color: white;
}

.services h2 {
    margin-bottom: 40px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 25px;
}

.card {
    background: rgba(255,255,255,0.08);
    padding: 40px;
    border-radius: 15px;
    transition: 0.3s;
    cursor: pointer;
}

.card:hover {
    transform: translateY(-10px);
    background: #00c6ff;
    color: black;
}

/* FOOTER */
footer {
    background: black;
    text-align: center;
    padding: 30px;
    color: white;
}

/* MOBILE */
@media(max-width:768px){
    nav {
        flex-direction: column;
        height: auto;
        padding: 10px;
    }

    nav div {
        margin-top: 10px;
    }
}

</style>

</head>

</nav>
