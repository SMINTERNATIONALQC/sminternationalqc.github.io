<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SM International Quality Control</title>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

/* NAVBAR */
nav {
    position: fixed;
    width: 100%;
    height: 70px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 50px;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
}

nav h2 {
    color: #00c6ff;
}

nav a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
    font-weight: bold;
}

/* HERO */
.hero {
    height: 100vh;
    background: url("sm.jpg") no-repeat center center;
    background-size: cover;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding-top: 70px;
}

/* TEXT */
.hero-title {
    font-size: 50px;
    color: white;
    font-weight: bold;
    text-shadow: 0 2px 10px rgba(0,0,0,0.7);
}

.hero-text {
    margin-top: 10px;
    font-size: 20px;
    color: #eee;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
}

/* BUTTON */
.btn {
    margin-top: 20px;
    padding: 12px 30px;
    border: none;
    background: #00c6ff;
    color: black;
    font-weight: bold;
    cursor: pointer;
    border-radius: 5px;
    transition: 0.3s;
}

.btn:hover {
    background: white;
}

/* SERVICES */
.services {
    padding: 80px 20px;
    background: #0f2027;
    text-align: center;
    color: white;
}

.services h2 {
    margin-bottom: 40px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 25px;
}

.card {
    background: rgba(255,255,255,0.08);
    padding: 40px;
    border-radius: 15px;
    transition: 0.3s;
    cursor: pointer;
}

.card:hover {
    transform: translateY(-10px);
    background: #00c6ff;
    color: black;
}

/* FOOTER */
footer {
    background: black;
    text-align: center;
    padding: 30px;
    color: white;
}

/* MOBILE */
@media(max-width:768px){
    nav {
        flex-direction: column;
        height: auto;
        padding: 10px;
    }

    nav div {
        margin-top: 10px;
    }

    .hero-title {
        font-size: 30px;
    }
}

</style>

</head>

<body>

<!-- NAVBAR -->
<nav>
    <h2>SM QC</h2>
    <div>
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>
        <a href="contact.html">Contact</a>
        <a href="request.html">Request</a>
    </div>
</nav>

<!-- HERO -->
<section class="hero">
    <h1 class="hero-title">SM International Quality Control</h1>
    <p class="hero-text">Inspection | Welding | Coating | Rope Access</p>

    <button class="btn" onclick="location.href='request.html'">
        Request Service
    </button>
</section>

<!-- SERVICES -->
<section class="services">
    <h2>Our Services</h2>

    <div class="grid">

        <div class="card">
            <h3>Inspection</h3>
        </div>

        <div class="card">
            <h3>Welding & Fabrication</h3>
        </div>

        <div class="card">
            <h3>Coating & Painting</h3>
        </div>

        <div class="card">
            <h3>Sandblasting</h3>
        </div>

        <div class="card">
            <h3>Rope Access</h3>
        </div>

    </div>
</section>

<!-- FOOTER -->
<footer>
    <p>Email: sm@sminternationalqc.com</p>
    <p>Cairo, Egypt</p>
</footer>

</body>
</html>
